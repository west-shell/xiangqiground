<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chessground-xq 测试</title>
    <!-- 引入 Chessground 样式 -->
    <link rel="stylesheet" href="../assets/chessground.base.css" />
    <!-- <link rel="stylesheet" href="../assets/chessground.brown.css"> -->
    <!-- <link rel="stylesheet" href="../assets/chessground.cburnett.css"> -->
    <link rel="stylesheet" href="../assets/chessground.board.css" />
    <link rel="stylesheet" href="../assets/chessground.xq.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #2d2d2d;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px;
        min-height: 100vh;
        font-family: 'Segoe UI', sans-serif;
        gap: 32px;
        flex-wrap: wrap;
      }

      /* 棋盘容器 - 国际象棋 8×8（正方形） */
      #board-container {
        width: 630px;
        height: 700px;
        flex-shrink: 0;
      }

      /* 右侧面板 */
      .panel {
        background: #fff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        min-width: 260px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .panel h2 {
        font-size: 20px;
        color: #333;
        margin-bottom: 4px;
      }

      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        transition:
          transform 0.1s,
          filter 0.1s;
      }

      .btn:hover {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn-random {
        background: #4a7cff;
        color: #fff;
      }

      .btn-flip {
        background: #9b59b6;
        color: #fff;
      }

      .btn-reset {
        background: #e67e22;
        color: #fff;
      }

      .info-box {
        background: #f5f5f5;
        border-radius: 8px;
        padding: 12px;
        font-size: 14px;
        line-height: 1.6;
      }

      .info-box label {
        font-weight: 600;
        color: #555;
      }

      .info-box textarea {
        width: 100%;
        height: 70px;
        margin-top: 6px;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        resize: vertical;
        background: #fff;
      }

      #turn-indicator {
        font-size: 18px;
        font-weight: bold;
        padding: 8px 12px;
        border-radius: 8px;
        text-align: center;
      }

      #status {
        color: #666;
        font-size: 13px;
      }

      .hint {
        font-size: 12px;
        color: #999;
        margin-top: 4px;
      }
    </style>
  </head>

  <body>
    <div id="board-container"></div>
    <div class="panel">
      <h2>🎮 中国象棋</h2>

      <div class="btn-group">
        <button class="btn btn-random" id="btn-random">🎲 随机步</button>
        <button class="btn btn-flip" id="btn-flip">🔄 翻转</button>
        <button class="btn btn-reset" id="btn-reset">🏠 重置</button>
      </div>

      <div class="info-box">
        <label>FEN</label>
        <textarea id="fen-output" readonly></textarea>
      </div>

      <div id="turn-indicator">走棋方: 🔴 红方</div>
      <div id="status">就绪</div>
      <div class="hint">点击红/黑棋子即可行棋</div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
